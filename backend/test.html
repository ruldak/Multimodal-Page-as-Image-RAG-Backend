<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Streaming Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f9fafb; color: #333; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2563eb; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .output-box { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; min-height: 50px; white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        .citation-tag { display: inline-block; background: #dbeafe; color: #1e40af; padding: 4px 10px; border-radius: 99px; font-size: 12px; margin-right: 6px; margin-bottom: 6px; font-weight: 600; }
        .stats { font-size: 12px; color: #6b7280; margin-top: 10px; text-align: right; }
        .error { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>RAG SSE Stream Tester</h2>
        <label>Base URL (Backend)</label>
        <input type="text" id="baseUrl" value="http://localhost:8000" placeholder="http://localhost:8000">
        
        <label>Session ID (UUID)</label>
        <input type="text" id="sessionId" placeholder="Enter a valid Session UUID.">
        
        <label>Question</label>
        <textarea id="message" rows="3" placeholder="Please explain the contents of the document....">What is the conclusion of this document?</textarea>
        
        <button id="sendBtn" onclick="sendRequest()">Send & Stream</button>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <h3>Citation (Received Early)</h3>
        <div id="citationsBox" style="margin-bottom: 16px;"></div>

        <h3>LLM Response (Streaming)</h3>
        <div id="responseBox" class="output-box"></div>
        
        <div id="statsBox" class="stats"></div>
    </div>

    <script>
        async function sendRequest() {
            const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, "");
            const sessionId = document.getElementById('sessionId').value.trim();
            const message = document.getElementById('message').value.trim();
            const btn = document.getElementById('sendBtn');

            if (!sessionId) { alert("Session ID must be filled!"); return; }

            // Reset UI
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('citationsBox').innerHTML = '<i>Awaiting citation...</i>';
            document.getElementById('responseBox').innerHTML = '';
            document.getElementById('statsBox').innerHTML = '';
            btn.disabled = true;
            btn.textContent = "Processing Stream...";

            try {
                const response = await fetch(`${baseUrl}/api/v1/chat/sessions/${sessionId}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || `HTTP Error ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();

                    for (const part of parts) {
                        if (!part.trim()) continue;
                        parseSSEEvent(part);
                    }
                }
            } catch (err) {
                document.getElementById('responseBox').innerHTML = `<span class="error">Error: ${err.message}</span><br><br><small>Error</small>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Send & Stream";
            }
        }

        function parseSSEEvent(rawEvent) {
            const lines = rawEvent.split('\n');
            let eventType = 'message';
            let dataStr = '';

            for (const line of lines) {
                if (line.startsWith('event:')) eventType = line.substring(6).trim();
                if (line.startsWith('data:')) dataStr += line.substring(5).trim();
            }

            if (!dataStr) return;

            try {
                const data = JSON.parse(dataStr);
                handleEvent(eventType, data);
            } catch (e) {
                if (dataStr === '[DONE]') handleEvent('done', null);
            }
        }

        function handleEvent(type, data) {
            if (type === 'citations') {
                const box = document.getElementById('citationsBox');
                box.innerHTML = '';
                if (data.length === 0) {
                    box.innerHTML = '<i>Citation not found.</i>';
                } else {
                    data.forEach(c => {
                        box.innerHTML += `<span class="citation-tag">Page ${c.page_number} (Score: ${c.score.toFixed(2)})</span>`;
                    });
                }
            } 
            else if (type === 'chunk') {
                const box = document.getElementById('responseBox');
                box.innerHTML += data.text;
                window.scrollTo(0, document.body.scrollHeight);
            } 
            else if (type === 'metadata') {
                document.getElementById('statsBox').innerHTML = 
                    `⏱️ Latency: ${data.latency_ms}ms`;
            }
            else if (type === 'done') {
                console.log("Stream ended!");
            }
            else if (type === 'error') {
                document.getElementById('responseBox').innerHTML += `<br><span class="error">Stream Error: ${data.detail}</span>`;
            }
        }
    </script>
</body>
</html>
